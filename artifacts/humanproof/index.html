<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>HumanShield | Ultimate AI Career Protection</title>
    <meta name="description" content="The high-fidelity standard for AI displacement auditing. Shield your professional future with the world's most advanced frontier AI risk engine." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <meta name="theme-color" content="#090c14" />
  </head>
  <body style="background-color:#090c14;color:#f0f0f5;margin:0;">
    <div id="root">
      <!-- Inline loading shell — React replaces this on mount.
           Prevents blank/black flash before the JS bundle executes. -->
      <div id="hs-boot" style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;font-family:system-ui,sans-serif;">
        <div style="width:10px;height:10px;border-radius:50%;background:#00d4e0;box-shadow:0 0 16px #00d4e0;animation:hs-pulse 1.4s ease-in-out infinite;"></div>
        <span style="font-size:0.75rem;letter-spacing:0.12em;color:rgba(240,240,245,0.4);text-transform:uppercase;">HumanShield</span>
      </div>
    </div>
    <style>
      @keyframes hs-pulse {
        0%,100%{opacity:0.3;transform:scale(1)}
        50%{opacity:1;transform:scale(1.5)}
      }
    </style>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // If React hasn't replaced #hs-boot within 12 seconds, show a recovery UI.
      // This catches silent mount failures (missing chunk, unhandled throw) so
      // users aren't stuck on the loading spinner indefinitely.
      (function () {
        var t = setTimeout(function () {
          var boot = document.getElementById('hs-boot');
          if (!boot) return; // React mounted — nothing to do
          boot.innerHTML =
            '<div style="text-align:center;padding:32px;max-width:400px;">' +
            '<p style="font-size:0.9rem;color:rgba(240,240,245,0.7);margin:0 0 16px">Failed to load. Check your internet connection or try a hard refresh.</p>' +
            '<button onclick="location.reload(true)" style="background:#00d4e0;color:#000;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-size:0.875rem;font-weight:600">Refresh</button>' +
            '</div>';
        }, 12000);
        // Cancel the timeout if React mounts and removes hs-boot from the DOM
        var obs = new MutationObserver(function () {
          if (!document.getElementById('hs-boot')) { clearTimeout(t); obs.disconnect(); }
        });
        obs.observe(document.getElementById('root'), { childList: true, subtree: false });
        // Log JS errors to the console so they show up in Vercel logs / browser devtools
        window.addEventListener('error', function (e) {
          console.error('[hs-boot error]', e.message, e.filename, e.lineno);
        });
        window.addEventListener('unhandledrejection', function (e) {
          console.error('[hs-boot unhandledrejection]', e.reason);
        });
      })();
    </script>
  </body>
</html>
