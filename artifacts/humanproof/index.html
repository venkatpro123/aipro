<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>HumanShield | Ultimate AI Career Protection</title>
    <meta name="description" content="The high-fidelity standard for AI displacement auditing. Shield your professional future with the world's most advanced frontier AI risk engine." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <meta name="theme-color" content="#090c14" />
  </head>
  <body style="background-color:#090c14;color:#f0f0f5;margin:0;">
    <div id="root">
      <!-- Inline loading shell — React replaces this on mount.
           Prevents blank/black flash before the JS bundle executes. -->
      <div id="hs-boot" style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;font-family:system-ui,sans-serif;">
        <div style="width:10px;height:10px;border-radius:50%;background:#00d4e0;box-shadow:0 0 16px #00d4e0;animation:hs-pulse 1.4s ease-in-out infinite;"></div>
        <span style="font-size:0.75rem;letter-spacing:0.12em;color:rgba(240,240,245,0.4);text-transform:uppercase;">HumanShield</span>
      </div>
    </div>
    <style>
      @keyframes hs-pulse {
        0%,100%{opacity:0.3;transform:scale(1)}
        50%{opacity:1;transform:scale(1.5)}
      }
    </style>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
