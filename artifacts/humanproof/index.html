<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <!-- v40.0 security: Content Security Policy.
         - 'unsafe-inline' on style-src is required for the inline shell + Tailwind utilities.
         - 'unsafe-inline' on script-src can be tightened with a nonce once the inline
           boot script is moved to an external file. wasm-unsafe-eval covers Yoga layout.
         - connect-src allows the Supabase project + Edge Functions and known data APIs.
         - frame-ancestors 'none' prevents clickjacking. -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval';
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' data: https://fonts.gstatic.com;
      img-src 'self' data: blob: https:;
      connect-src 'self' https://*.supabase.co wss://*.supabase.co https://fonts.googleapis.com https://fonts.gstatic.com https://*.alphavantage.co https://newsapi.org https://api.fred.stlouisfed.org https://api.bls.gov https://query1.finance.yahoo.com https://query2.finance.yahoo.com https://api.openrouter.ai https://generativelanguage.googleapis.com;
      worker-src 'self' blob:;
      object-src 'none';
      base-uri 'self';
      form-action 'self';
      frame-ancestors 'none';
      upgrade-insecure-requests;
    ">
    <title>HumanProof | Career Risk Intelligence Platform</title>
    <meta name="description" content="Real-time monitoring of your company, role, and market signals — with predictive layoff risk alerts and 30–90 day forecasts." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
    <meta name="theme-color" content="#090c14" />
    <!-- Pre-paint theme application — avoids flash of wrong theme.
         Default = dark. 'light' is opt-in and persisted in localStorage. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('hp-theme');
          if (t === 'light') {
            document.documentElement.classList.add('light');
          }
        } catch (e) {}
        var isLight = document.documentElement.classList.contains('light');
        document.documentElement.style.background = isLight ? '#f6f7f9' : '#090c14';
      })();
    </script>
  </head>
  <body style="margin:0;">
    <div id="root">
      <!-- Inline loading shell — React replaces this on mount. -->
      <div id="hs-boot" style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;font-family:system-ui,sans-serif;background:var(--bg,#090c14);">
        <div style="width:10px;height:10px;border-radius:50%;background:#00d4e0;box-shadow:0 0 16px #00d4e0;animation:hs-pulse 1.4s ease-in-out infinite;"></div>
        <span style="font-size:0.75rem;letter-spacing:0.12em;color:rgba(160,170,190,0.5);text-transform:uppercase;">HumanProof</span>
      </div>
    </div>
    <style>
      @keyframes hs-pulse {
        0%,100%{opacity:0.3;transform:scale(1)}
        50%{opacity:1;transform:scale(1.5)}
      }
    </style>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // If React hasn't replaced #hs-boot within 12 seconds, show a recovery UI.
      // This catches silent mount failures (missing chunk, unhandled throw) so
      // users aren't stuck on the loading spinner indefinitely.
      (function () {
        var t = setTimeout(function () {
          var boot = document.getElementById('hs-boot');
          if (!boot) return; // React mounted — nothing to do
          boot.innerHTML =
            '<div style="text-align:center;padding:32px;max-width:400px;">' +
            '<p style="font-size:0.9rem;color:rgba(17,19,26,0.7);margin:0 0 16px">Failed to load. Check your internet connection or try a hard refresh.</p>' +
            '<button onclick="location.reload(true)" style="background:#0096aa;color:#fff;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-size:0.875rem;font-weight:600">Refresh</button>' +
            '</div>';
        }, 12000);
        // Cancel the timeout if React mounts and removes hs-boot from the DOM
        var obs = new MutationObserver(function () {
          if (!document.getElementById('hs-boot')) { clearTimeout(t); obs.disconnect(); }
        });
        obs.observe(document.getElementById('root'), { childList: true, subtree: false });
        // Log JS errors to the console so they show up in Vercel logs / browser devtools
        window.addEventListener('error', function (e) {
          console.error('[hs-boot error]', e.message, e.filename, e.lineno);
        });
        window.addEventListener('unhandledrejection', function (e) {
          console.error('[hs-boot unhandledrejection]', e.reason);
        });
      })();
    </script>
  </body>
</html>
